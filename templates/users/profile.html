{% extends "base.html" %}

{% block title %}Profile — Collective{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto">
  <h1 class="text-2xl font-bold mb-6">Profile Settings</h1>

  <div class="card bg-base-100 shadow-sm mb-6">
    <div class="card-body">
      <h2 class="card-title text-lg">Account</h2>
      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="space-y-1">
          <label class="label" for="id_name"><span>Display Name</span></label>
          {{ form.name }}
          {% if form.name.errors %}
            <p class="text-error text-sm mt-1">{{ form.name.errors.0 }}</p>
          {% endif %}
        </div>

        <div class="space-y-1">
          <label class="label"><span>Email</span></label>
          <div class="flex items-center gap-2">
            <input type="text" value="{{ user.email }}" class="input w-full" disabled />
            <a href="{% url 'account_email' %}" class="btn btn-outline btn-sm">Change</a>
          </div>
        </div>

        <button type="submit" class="btn btn-primary">Save</button>
      </form>
    </div>
  </div>

  <div class="card bg-base-100 shadow-sm">
    <div class="card-body">
      <h2 class="card-title text-lg">Security</h2>
      <a href="{% url 'account_change_password' %}" class="btn btn-outline btn-sm w-fit">Change Password</a>
    </div>
  </div>
</div>
{% endblock %}
