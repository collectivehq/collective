<div id="move-tree-{{ item_id }}"
     class="max-h-72 overflow-y-auto">
  {% for d in all_discussions %}
  {% with pid=d.parent_id_str %}
  <div data-parent-id="{{ pid }}"
       style="padding-left: {{ d.level }}rem"
       {% if d.level > 0 %}x-show="isExpanded('{{ pid }}')"{% endif %}
       class="tree-node flex items-center gap-0.5 py-0.5">
    {% if d.level > 0 %}
    <button type="button"
            x-show="hasChildren('{{ d.pk }}')"
            @click.stop="toggle('{{ d.pk }}')"
            class="btn btn-ghost btn-xs btn-square flex-shrink-0">
      <i :data-lucide="isExpanded('{{ d.pk }}') ? 'chevron-down' : 'chevron-right'" class="w-3 h-3"></i>
    </button>
    <span x-show="!hasChildren('{{ d.pk }}')" class="w-4 flex-shrink-0"></span>
    {% else %}
    <button type="button"
            @click.stop="toggle('{{ d.pk }}')"
            class="btn btn-ghost btn-xs btn-square flex-shrink-0">
      <i :data-lucide="isExpanded('{{ d.pk }}') ? 'chevron-down' : 'chevron-right'" class="w-3 h-3"></i>
    </button>
    {% endif %}
    <button type="button"
            @click="selectedDiscussion = '{{ d.pk }}'"
            :class="selectedDiscussion === '{{ d.pk }}' ? 'bg-primary/10 font-semibold' : ''"
            class="btn btn-ghost btn-sm h-auto min-h-0 flex-1 min-w-0 justify-between rounded-lg px-2 py-1 text-sm normal-case text-left">
      <span class="truncate">{{ d.label|default:"Untitled" }}</span>
      <span class="flex items-center gap-0.5 text-xs text-base-content/50 flex-shrink-0">
        <i data-lucide="message-square" class="w-3 h-3"></i>{{ d.numchild }}
      </span>
    </button>
  </div>
  {% endwith %}
  {% endfor %}
</div>
