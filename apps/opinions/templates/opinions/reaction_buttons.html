{% load opinions_tags %}
<div id="reactions-{{ post.pk }}" class="flex items-center gap-1"
     hx-target="#reactions-{{ post.pk }}"
     hx-swap="outerHTML">
{% if user_reaction %}
  <span class="flex items-center gap-0.5 text-xs text-base-content/60">
    {% if user_reaction == 'like' %}<i data-lucide="thumbs-up" class="w-3 h-3 text-primary"></i>{% else %}<i data-lucide="thumbs-down" class="w-3 h-3 text-error"></i>{% endif %}
  </span>
{% endif %}
<div class="dropdown dropdown-top">
  <label tabindex="0" class="btn btn-ghost btn-xs btn-square">
    <i data-lucide="smile-plus" class="w-3.5 h-3.5"></i>
  </label>
  <ul tabindex="0" class="dropdown-content z-10 menu menu-sm p-1 shadow-lg bg-base-100 rounded-box w-32 mb-1">
    {% if "like" in space.reaction_types %}
    <li>
      <button hx-post="{% url 'opinions:toggle_reaction' space_id=space.pk post_id=post.pk %}"
              hx-vals='{"type": "like"}'
              class="{% if user_reaction == 'like' %}font-bold text-primary{% endif %}">
        <i data-lucide="thumbs-up" class="w-3.5 h-3.5"></i> Like <span class="badge badge-xs">{{ reaction_counts|dict_get:"like" }}</span>
      </button>
    </li>
    {% endif %}
    {% if "dislike" in space.reaction_types %}
    <li>
      <button hx-post="{% url 'opinions:toggle_reaction' space_id=space.pk post_id=post.pk %}"
              hx-vals='{"type": "dislike"}'
              class="{% if user_reaction == 'dislike' %}font-bold text-error{% endif %}">
        <i data-lucide="thumbs-down" class="w-3.5 h-3.5"></i> Dislike <span class="badge badge-xs">{{ reaction_counts|dict_get:"dislike" }}</span>
      </button>
    </li>
    {% endif %}
  </ul>
</div>
</div>
