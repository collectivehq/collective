{% load nodes_tags %}
<p class="text-xs text-base-content/60 mb-2">
  Drag to reorder in "<span class="font-medium">{{ discussion.label|default:"Untitled" }}</span>":
</p>
<div id="move-sortable-{{ moved_post_id }}"
     class="flex flex-col gap-1 max-h-64 overflow-y-auto"
     data-moved-post-id="{{ moved_post_id }}">
  {% for child in children %}
  <div class="flex items-center gap-2 p-2 rounded-lg text-xs
              {% if child.pk|stringformat:'s' == moved_post_id %}bg-primary/10 border border-primary/30{% else %}bg-base-200{% endif %}"
       data-id="{{ child.pk }}">
    <span class="drag-handle cursor-grab"><i data-lucide="grip-vertical" class="w-3 h-3 text-base-content/30 flex-shrink-0"></i></span>
    {% if child.is_post %}
      <i data-lucide="message-square" class="w-3 h-3 flex-shrink-0"></i>
      <span class="truncate">{{ child.content|striptags|truncatewords:10 }}</span>
    {% elif child.is_link %}
      <i data-lucide="link" class="w-3 h-3 flex-shrink-0"></i>
      <span class="truncate">{{ child.label|default:"Link" }}</span>
    {% endif %}
  </div>
  {% endfor %}
</div>
<input type="hidden" name="position" id="move-position-input-{{ moved_post_id }}" value="{{ children|length|add:'-1' }}">
