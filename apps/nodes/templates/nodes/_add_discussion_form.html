<div x-data="{ adding: false }">
  {% if show_spacer %}
  <div x-show="!adding" class="flex items-center gap-0.5 py-0.5">
    <span class="w-4 flex-shrink-0"></span>
    <button @click="adding = true"
            class="btn btn-ghost btn-sm justify-start flex-1 min-w-0 border-dashed border-base-content/30 text-base-content/60 hover:text-base-content/80">
      <i data-lucide="plus" class="w-3 h-3 inline"></i> Add Discussion
    </button>
  </div>
  {% else %}
  <button x-show="!adding" @click="adding = true"
          class="btn btn-ghost btn-sm justify-start w-full border-dashed border-base-content/30 text-base-content/60 hover:text-base-content/80">
    <i data-lucide="plus" class="w-3 h-3 inline"></i> Add Discussion
  </button>
  {% endif %}
  <form x-show="adding" x-cloak hx-post="{% url 'nodes:discussion_create' space_id=space.pk %}"
        hx-target="#tree-panel" hx-swap="innerHTML" class="flex items-center gap-1{% if show_spacer %} py-0.5{% endif %}">
    {% csrf_token %}
    <input type="hidden" name="parent_id" value="{{ parent_id }}">
    {% if show_spacer %}<span class="w-4 flex-shrink-0"></span>{% endif %}
    <input type="text" name="label" placeholder="Discussion topic" class="input input-xs flex-1" required
           x-ref="addInput" x-init="$watch('adding', v => { if (v) $nextTick(() => $refs.addInput.focus()) })" @keydown.escape="adding = false">
    <button type="submit" class="btn btn-primary btn-xs btn-square flex items-center justify-center tooltip tooltip-bottom" data-tip="Confirm"><i data-lucide="check" class="w-3.5 h-3.5"></i></button>
    <button type="button" @click="adding = false" class="btn btn-ghost btn-xs btn-square flex items-center justify-center tooltip tooltip-bottom" data-tip="Cancel"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
  </form>
</div>
