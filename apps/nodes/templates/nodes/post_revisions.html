{% load nodes_tags %}
{% for revision in revisions %}
<div class="card bg-base-100 shadow-sm mb-3">
  <div class="card-body py-3 px-4">
    <div class="text-xs text-base-content/50 mb-1">{{ revision.created_at|timesince }} ago</div>
    <div class="prose prose-sm max-w-none">{{ revision.content|sanitize_html }}</div>
  </div>
</div>
{% empty %}
<p class="text-xs text-base-content/50">No revisions recorded.</p>
{% endfor %}
